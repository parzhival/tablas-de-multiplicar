<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas de multiplicar</title>
    <link rel="stylesheet" href="multiplicar.css">
    <script src="multiplicar.js"></script>
</head>
<body>

    <header>
        
        <div class="contenedor-header">
            <button class="btn-probar" onclick="generarTablas();">PROBAR</button>
            <input type="text" class="input-texto" placeholder="ingresa un número" id="txtNumb" />
            <p class="instrucciones">
            👉 Escribe un numero, presiona PROBAR y mira la magia de las matemáticas
            </p>
        </div>       
    </header>

    <main>
        <div class="contenedor-tabla">

            <h1>✨ Tablas de multiplicar✨</h1>
            <div class="tabla" id="tablas">
                <div class="fila">1 x 1 = 1</div>
                <div class="fila">1 x 2 = 2</div>
                <div class="fila">1 x 3 = 3</div>
                <div class="fila">1 x 4 = 4</div>
                <div class="fila">1 x 5 = 5</div>
                <div class="fila">1 x 6 = 6</div>
                <div class="fila">1 x 7 = 7</div>
                <div class="fila">1 x 8 = 8</div>
                <div class="fila">1 x 9 = 9</div>
                <div class="fila">1 x 10 = 10</div>
                <div class="fila">1 x 11 = 11</div>
                <div class="fila">1 x 12 = 12</div>
            </div>
        </div>    
    </main>
    <footer>
    <p>Creado por: PARZHIVAL </p>
    </footer>

</body>
</html>
